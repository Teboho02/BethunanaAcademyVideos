name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main   # change if you use a different branch for prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Deploy via SSH to your server
      - name: SSH & deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/ubuntu/BethunanaAcademy

            # Get latest code
            git fetch origin
            #get the new updated code
            git reset --hard origin/main

            # Install deps & build
            npm install --production=false
            # If monorepo, you can cd into backend/frontend and run commands there.

            # If backend uses build step:
            npm run build

            cd backend

            npm run install



            # Restart backend with PM2
            pm2 restart  BethunanaAcademy || pm2 start npm --name BethunanaAcademy -- run start

            # Save PM2 state
            pm2 save