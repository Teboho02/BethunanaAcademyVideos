name: Deploy BethunanaAcademy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo ">>> [START] SSH connection established, beginning deploy"

            # -----------------------------
            # 0. BASIC VARS
            # -----------------------------
            APP_DIR="/home/ubuntu/BethunanaAcademy"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/Teboho02/BethunanaAcademyVideos.git"
            BRANCH="main"
            APP_NAME="BethunanaAcademy"

            # -----------------------------
            # 1. INSTALL MISSING DEPENDENCIES ONLY
            # -----------------------------

            # Node.js
            if ! command -v node &> /dev/null; then
              echo ">>> Node.js not found, installing..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            echo ">>> Node: $(node --version) | npm: $(npm --version)"

            # PM2
            if ! command -v pm2 &> /dev/null; then
              echo ">>> PM2 not found, installing..."
              sudo npm install -g pm2
            fi
            echo ">>> PM2: $(pm2 --version)"

            # Web server (Caddy on EC2 / nginx on the old Lightsail box) is
            # provisioned once by deploy/ec2-setup.sh, not per-deploy.

            # -----------------------------
            # 2. DATABASE
            # -----------------------------
            # The backend now uses Azure SQL Server; connection settings live in
            # ${APP_DIR}/backend/.env (SQLSERVER_HOST/USER/PASSWORD/DATABASE).
            # Nothing to provision on this server.

            # -----------------------------
            # 3. PULL LATEST CODE
            # -----------------------------
            echo ">>> Pulling latest code..."
            if [ ! -d "${APP_DIR}/.git" ]; then
              echo ">>> No repo found, cloning..."
              git clone "${REPO_URL}" "${APP_DIR}"
            else
              cd "${APP_DIR}"
              git fetch origin
              git reset --hard "origin/${BRANCH}"
              echo ">>> Updated to: $(git log -1 --oneline)"
            fi

            cd "${APP_DIR}"

            # -----------------------------
            # 4. INSTALL DEPS & BUILD FRONTEND
            # -----------------------------
            echo ">>> Installing root dependencies..."
            npm install

            # Build into a staging dir and swap it in with renames. vite empties
            # its output dir at the START of the build, so building straight into
            # ./dist — the directory the LIVE server serves from — makes every
            # request 500 for the whole build (index.html is briefly gone, so the
            # SPA fallback's res.sendFile fails). Staging keeps the live dist a
            # complete build at all times; the swap gap is two renames (sub-ms).
            echo ">>> Building frontend (staged, atomic swap)..."
            rm -rf dist.new dist.old
            npm run build -- --outDir dist.new --emptyOutDir
            [ -d dist ] && mv dist dist.old
            mv dist.new dist
            rm -rf dist.old

            # -----------------------------
            # 5. INSTALL BACKEND DEPS
            # -----------------------------
            echo ">>> Installing backend dependencies..."
            cd "${APP_DIR}/backend"
            npm install

            echo ">>> Building backend..."
            npm run build

            # -----------------------------
            # 5b. AUTH SECRETS IN backend/.env
            # -----------------------------
            # Written once from GitHub secrets; existing values are kept.
            touch "${APP_DIR}/backend/.env"
            grep -q '^JWT_SECRET=' "${APP_DIR}/backend/.env" \
              || echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> "${APP_DIR}/backend/.env"
            grep -q '^ENROLL_SYNC_SECRET=' "${APP_DIR}/backend/.env" \
              || echo 'ENROLL_SYNC_SECRET=${{ secrets.ENROLL_SYNC_SECRET }}' >> "${APP_DIR}/backend/.env"

            # -----------------------------
            # 6. RESTART APP WITH PM2
            # -----------------------------
            # Delete (not restart) and kill any orphaned backend processes:
            # a leftover node process holding port 4000 makes every new API
            # start die with EADDRINUSE while the stale code keeps serving.
            echo ">>> Restarting app with PM2..."
            # The ssh action passes this whole script as one command string,
            # so it appears verbatim in the session's own command line. The
            # character classes keep the patterns from matching themselves,
            # and NOTHING else in this script (comments included!) may spell
            # out those process paths literally. Patterns use no directory
            # prefix because the processes are spawned with relative paths.
            # fuser is the backstop: kill whatever still holds the app port.
            pm2 delete "${APP_NAME}" > /dev/null 2>&1 || true
            pkill -f "run-api-worker[.]mjs" || true
            pkill -f "dist/index[.]js" || true
            pkill -f "dist/worker[s]" || true
            fuser -k 4000/tcp > /dev/null 2>&1 || true
            sleep 2

            cd "${APP_DIR}/backend"
            pm2 start npm --name "${APP_NAME}" -- run start
            pm2 save
            pm2 startup systemd -u ${USER} --hp /home/${USER} || true

            pm2 list
            echo ">>> [DONE] Deploy complete!"