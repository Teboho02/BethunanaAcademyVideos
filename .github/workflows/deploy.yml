name: Deploy BethunanaAcademy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo ">>> [START] SSH connection established, beginning deploy"

            # -----------------------------
            # 0. BASIC VARS
            # -----------------------------
            APP_DIR="/home/ubuntu/BethunanaAcademy"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/Teboho02/BethunanaAcademyVideos.git"
            BRANCH="main"
            APP_NAME="BethunanaAcademy"

            DB_NAME="BethunanaAcademy"
            DB_USER="Teboho"
            DB_PASS="${{ secrets.DB_PASSWORD }}"

            # -----------------------------
            # 1. INSTALL MISSING DEPENDENCIES ONLY
            # -----------------------------

            # Node.js
            if ! command -v node &> /dev/null; then
              echo ">>> Node.js not found, installing..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            echo ">>> Node: $(node --version) | npm: $(npm --version)"

            # PM2
            if ! command -v pm2 &> /dev/null; then
              echo ">>> PM2 not found, installing..."
              sudo npm install -g pm2
            fi
            echo ">>> PM2: $(pm2 --version)"

            # Nginx
            if ! command -v nginx &> /dev/null; then
              echo ">>> Nginx not found, installing..."
              sudo apt-get install -y nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi
            echo ">>> Nginx: $(sudo systemctl is-active nginx)"

            # MySQL
            if ! command -v mysql &> /dev/null; then
              echo ">>> MySQL not found, installing..."
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-server
              sudo systemctl enable mysql
              sudo systemctl start mysql
            fi
            echo ">>> MySQL: $(sudo systemctl is-active mysql)"

            # -----------------------------
            # 2. DATABASE SETUP (idempotent)
            # -----------------------------
            echo ">>> Ensuring database and user exist..."
            sudo mysql <<EOF
            CREATE DATABASE IF NOT EXISTS \`${DB_NAME}\`
              CHARACTER SET utf8mb4
              COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS '${DB_USER}'@'localhost' IDENTIFIED BY '${DB_PASS}';
            GRANT ALL PRIVILEGES ON \`${DB_NAME}\`.* TO '${DB_USER}'@'localhost';
            FLUSH PRIVILEGES;
            EOF
            echo ">>> Database ready"

            # -----------------------------
            # 3. PULL LATEST CODE
            # -----------------------------
            echo ">>> Pulling latest code..."
            if [ ! -d "${APP_DIR}/.git" ]; then
              echo ">>> No repo found, cloning..."
              git clone "${REPO_URL}" "${APP_DIR}"
            else
              cd "${APP_DIR}"
              git fetch origin
              git reset --hard "origin/${BRANCH}"
              echo ">>> Updated to: $(git log -1 --oneline)"
            fi

            cd "${APP_DIR}"

            # -----------------------------
            # 4. INSTALL DEPS & BUILD FRONTEND
            # -----------------------------
            echo ">>> Installing root dependencies..."
            npm install

            echo ">>> Building frontend..."
            npm run build

            # -----------------------------
            # 5. INSTALL BACKEND DEPS
            # -----------------------------
            echo ">>> Installing backend dependencies..."
            cd "${APP_DIR}/backend"
            npm install

            # -----------------------------
            # 6. RESTART APP WITH PM2
            # -----------------------------
            echo ">>> Restarting app with PM2..."
            if pm2 describe "${APP_NAME}" > /dev/null 2>&1; then
              pm2 restart "${APP_NAME}"
            else
              pm2 start npm --name "${APP_NAME}" -- run start
              pm2 save
              pm2 startup systemd -u ${USER} --hp /home/${USER} || true
            fi

            pm2 list
            echo ">>> [DONE] Deploy complete!"